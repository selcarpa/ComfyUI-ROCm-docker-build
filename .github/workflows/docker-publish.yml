name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      comfyui_tag:
        description: 'ComfyUI Git tag (e.g. v0.22.0)'
        required: true
        type: string
        default: 'v0.22.0'
      comfyui_manager_tag:
        description: 'ComfyUI-Manager Git tag (e.g. 4.2.1)'
        required: false
        type: string
        default: '4.2.1'
      base_image_tag:
        description: 'ROCm PyTorch base image tag (e.g. rocm7.2.4_ubuntu24.04_py3.12_pytorch_release_2.10.0)'
        required: true
        type: string
        default: 'rocm7.2.4_ubuntu24.04_py3.12_pytorch_release_2.10.0'
      publish_as_latest:
        description: 'Also push as latest tag'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Build only, skip push'
        required: false
        type: boolean
        default: false

env:
  IMAGE_NAME: selcarpa/comfyui-rocm

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      detailed_tag: ${{ steps.build.outputs.detailed_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        id: build
        run: |
          DETAILED_TAG="$(TZ=Asia/Shanghai date +%Y%m%d_%H%M)_comfyui_${{ inputs.comfyui_tag }}__${{ inputs.base_image_tag }}"
          echo "detailed_tag=${DETAILED_TAG}" >> "$GITHUB_OUTPUT"
          IMAGE_NAME="${{ env.IMAGE_NAME }}" \
          COMFYUI_TAG="${{ inputs.comfyui_tag }}" \
          COMFYUI_MANAGER_TAG="${{ inputs.comfyui_manager_tag }}" \
          BASE_IMAGE_TAG="${{ inputs.base_image_tag }}" \
          ./build.sh

      - name: Push detailed tag
        if: ${{ !inputs.dry_run }}
        run: |
          docker push "${{ env.IMAGE_NAME }}:${{ steps.build.outputs.detailed_tag }}"

      - name: Push latest tag
        if: ${{ inputs.publish_as_latest && !inputs.dry_run }}
        run: |
          docker tag "${{ env.IMAGE_NAME }}:${{ steps.build.outputs.detailed_tag }}" "${{ env.IMAGE_NAME }}:latest"
          docker push "${{ env.IMAGE_NAME }}:latest"

      - name: Update Docker Hub README
        if: ${{ !inputs.dry_run }}
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./README_EN.md
