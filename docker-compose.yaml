services:
  comfyui-rocm:
    # Docker image to use
    image: selcarpa/comfyui-rocm:latest
    # Container name
    container_name: comfyui-rocm
    # Container hostname
    hostname: comfyui-rocm
    
    # GPU access for AMD ROCm
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    
    # Add video group for GPU access
    group_add:
      - video
    
    # Port mapping (host:container)
    ports:
      - "8188:8188"

    # Volume mapping to persist data
    volumes:
      # Model files (checkpoints, VAE, LoRA, etc.)
      - ./data/models:/workspace/ComfyUI/models
      # Generated outputs
      - ./data/output:/workspace/ComfyUI/output
      # Input images
      - ./data/input:/workspace/ComfyUI/input
      # Custom nodes
      - ./data/custom_nodes:/workspace/ComfyUI/custom_nodes
      # User settings & workflows
      - ./data/user:/workspace/ComfyUI/user
      # Temporary files
      - ./data/temp:/workspace/ComfyUI/temp

    # Environment variables
    environment:
      # ROCm: select GPU device index
      - HIP_VISIBLE_DEVICES=0
      # Disable CUDA (use ROCm/HIP instead)
      - CUDA_VISIBLE_DEVICES=""

    # Auto-restart unless manually stopped
    restart: unless-stopped
    
    # Healthcheck to verify ComfyUI is running
    healthcheck:
      # Check if the web UI responds
      test: ["CMD", "curl", "-f", "http://localhost:8188/"]
      # Check every 30 seconds
      interval: 30s
      # Timeout per check
      timeout: 10s
      # Retry 3 times before marking unhealthy
      retries: 3
      # Wait 120s before first check
      start_period: 120s
